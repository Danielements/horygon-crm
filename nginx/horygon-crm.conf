# /etc/nginx/sites-available/horygon-crm
#
# PRIMA DI USARE QUESTO FILE:
# 1. Installa Certbot: apt install certbot python3-certbot-nginx
# 2. Ottieni certificato: certbot --nginx -d crm.horygon.it
# 3. Certbot modificherà automaticamente questo file con i path SSL
#
# Sostituisci crm.horygon.it con il tuo dominio reale

server {
    listen 80;
    server_name crm.horygon.it;

    # Redirect tutto HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crm.horygon.it;

    # ── SSL (compilato da Certbot) ──────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/crm.horygon.it/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.horygon.it/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Rate limiting Nginx (primo livello) ─────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upload max size (per PDF e immagini) ─────────────────
    client_max_body_size 20M;

    # ── Login endpoint: rate limit stretto ──────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API generica ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Tutto il resto (frontend + uploads) ──────────────────
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/horygon-crm.access.log;
    error_log  /var/log/nginx/horygon-crm.error.log;
}
